# Pengine + Pengui: join Pengui’s bridge (`pengui-network`) so nginx can proxy to
# http://pengine-app:1422. Deploy Pengui first so the network exists.
# PENGUI_NETWORK_NAME if your Pengui compose uses another network name (see docker network ls).
networks:
  pengui-network:
    external: true
    name: ${PENGUI_NETWORK_NAME:-pengui-network}

services:
  pengine-web:
    image: ${PENGINE_WEB_IMAGE:-ghcr.io/pengine-ai/pengine-web:latest}
    container_name: pengine-app
    hostname: pengine
    restart: unless-stopped
    networks:
      - pengui-network
    # Vite preview — serves `dist/` (must match deploy/Dockerfile CMD).
    command: ["npm", "run", "preview", "--", "--host", "0.0.0.0", "--port", "1422"]
    ports:
      - "1422:1422"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:1422/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
