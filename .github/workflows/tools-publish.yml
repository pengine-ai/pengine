name: Publish tool images

# Build and push tool container images to GHCR.
#
# Each tool lives in tools/<slug>/ with:
#   - pengine-tool.json   (manifest: id, version, upstream npm, etc.)
#   - Dockerfile
#
# Triggers:
#   - Push to main touching tools/** → build only changed tools
#   - Manual dispatch → pick one slug or "all"

on:
  workflow_dispatch:
    inputs:
      tool:
        description: 'Tool slug (e.g. "file-manager") or "all"'
        required: false
        default: "all"
  push:
    branches: [main]
    paths: ["tools/**"]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      skip:   ${{ steps.detect.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find tools to publish
        id: detect
        run: |
          set -euo pipefail

          # All valid tool slugs: dirs under tools/ that have both manifest + Dockerfile.
          all=""
          for manifest in tools/*/pengine-tool.json; do
            dir=$(dirname "$manifest")
            slug=$(basename "$dir")
            [ -f "$dir/Dockerfile" ] && all="$all $slug"
          done

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            input="${{ github.event.inputs.tool }}"
            if [[ "$input" == "all" || -z "$input" ]]; then
              slugs="$all"
            else
              slugs="$input"
            fi
          else
            # Push to main: only tools whose directory changed.
            changed=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
            slugs=""
            for s in $all; do
              if echo "$changed" | grep -q "^tools/${s}/"; then
                slugs="$slugs $s"
              fi
            done
          fi

          # Build JSON matrix.
          json="["
          for s in $slugs; do
            [ -f "tools/${s}/pengine-tool.json" ] && [ -f "tools/${s}/Dockerfile" ] && json="$json\"$s\","
          done
          json="${json%,}]"

          if [[ "$json" == "[]" ]]; then
            echo "skip=true"  >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
          echo "matrix=$json" >> "$GITHUB_OUTPUT"
          echo "Tools: $json"

  publish:
    needs: detect
    if: needs.detect.outputs.skip == 'false'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        slug: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@v3

      - name: Read manifest
        id: cfg
        run: |
          set -euo pipefail
          MANIFEST="tools/${{ matrix.slug }}/pengine-tool.json"
          SUFFIX=$(jq -r '.id | split("/")[1]' "$MANIFEST")
          echo "image=ghcr.io/pengine-ai/tools/pengine-${SUFFIX}" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r '.version' "$MANIFEST")"          >> "$GITHUB_OUTPUT"

          # Optional: upstream npm package for docker build-args.
          PKG=$(jq -r '(.upstream_mcp_npm // {}).package // ""' "$MANIFEST")
          VER=$(jq -r '(.upstream_mcp_npm // {}).version // ""' "$MANIFEST")
          echo "npm_pkg=$PKG" >> "$GITHUB_OUTPUT"
          echo "npm_ver=$VER" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: tools/${{ matrix.slug }}/
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            UPSTREAM_MCP_NPM_PACKAGE=${{ steps.cfg.outputs.npm_pkg }}
            UPSTREAM_MCP_NPM_VERSION=${{ steps.cfg.outputs.npm_ver }}
          tags: |
            ${{ steps.cfg.outputs.image }}:${{ steps.cfg.outputs.version }}
            ${{ steps.cfg.outputs.image }}:latest

      - name: Sign image
        run: cosign sign --yes "${{ steps.cfg.outputs.image }}@${{ steps.build.outputs.digest }}"

      - name: Smoke test (MCP init handshake)
        run: |
          set -euo pipefail
          IMAGE="${{ steps.cfg.outputs.image }}@${{ steps.build.outputs.digest }}"
          docker pull "$IMAGE"
          RESP=$(echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"smoke","version":"0.0.1"}}}' \
            | timeout 15 docker run --rm -i --network=none "$IMAGE" /tmp \
            | head -1)
          echo "$RESP" | jq -e '.result.serverInfo' > /dev/null \
            || { echo "::error::MCP init failed: $RESP"; exit 1; }

      - name: Summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ### ${{ matrix.slug }} v${{ steps.cfg.outputs.version }}
          - **Image:** \`${{ steps.cfg.outputs.image }}@${{ steps.build.outputs.digest }}\`
          - **Platforms:** linux/amd64, linux/arm64
          - **Signed:** cosign keyless

          Digest for catalog:
          \`\`\`
          ${{ steps.build.outputs.digest }}
          \`\`\`
          EOF
