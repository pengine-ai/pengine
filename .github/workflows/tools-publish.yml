name: Publish tool images

# Builds and pushes only tools whose files changed since the last commit.
# Each tool lives in tools/<slug>/ with a pengine-tool.json manifest.

on:
  workflow_dispatch:
    inputs:
      tools:
        description: 'Comma-separated tool slugs (directory names under tools/), or "all"'
        required: false
        default: "all"
  push:
    branches: [main]
    paths:
      - "tools/**"
      - "catalog/entries/**"
    tags:
      - "*-v*"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      skip: ${{ steps.detect.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed tools
        id: detect
        run: |
          set -euo pipefail

          # List all tool slugs (directories under tools/ that contain pengine-tool.json)
          all_slugs=$(find tools -maxdepth 2 -name pengine-tool.json -printf '%h\n' | sed 's|^tools/||' | sort)

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            input="${{ github.event.inputs.tools }}"
            if [[ "$input" == "all" || -z "$input" ]]; then
              slugs="$all_slugs"
            else
              slugs=$(echo "$input" | tr ',' '\n' | xargs)
            fi
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Tag like "file-manager-v0.2.0" → slug "file-manager"
            tag="${{ github.ref_name }}"
            slug="${tag%-v*}"
            if echo "$all_slugs" | grep -qx "$slug"; then
              slugs="$slug"
            else
              echo "Tag '$tag' does not match any tool directory"
              echo 'skip=true' >> "$GITHUB_OUTPUT"
              echo 'matrix=[]' >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            # Push to main: find which tools/<slug>/ or catalog/entries/ changed
            changed=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git ls-files)
            slugs=$(echo "$changed" | grep '^tools/' | cut -d/ -f2 | sort -u)
            # Also rebuild if a catalog entry changed (entry filename matches slug)
            catalog_slugs=$(echo "$changed" | grep '^catalog/entries/' | sed 's|^catalog/entries/||;s|\.json$||' | sort -u)
            slugs=$(printf '%s\n%s' "$slugs" "$catalog_slugs" | sort -u | xargs)
          fi

          # Filter to only slugs that actually have a pengine-tool.json
          valid=""
          for s in $slugs; do
            if [ -f "tools/$s/pengine-tool.json" ]; then
              valid="$valid\"$s\","
            fi
          done
          valid="[${valid%,}]"

          if [[ "$valid" == "[]" ]]; then
            echo 'skip=true' >> "$GITHUB_OUTPUT"
          else
            echo 'skip=false' >> "$GITHUB_OUTPUT"
          fi
          echo "matrix=$valid" >> "$GITHUB_OUTPUT"
          echo "Publishing: $valid"

  publish:
    needs: detect
    if: needs.detect.outputs.skip == 'false'
    runs-on: ubuntu-latest
    concurrency:
      group: tools-publish-${{ matrix.slug }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        slug: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@v3

      - name: Read tool manifest
        id: cfg
        run: |
          MANIFEST="tools/${{ matrix.slug }}/pengine-tool.json"
          echo "image=ghcr.io/pengine-ai/tools/pengine-$(jq -r '.id | split("/")[1]' "$MANIFEST")" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r '.version' "$MANIFEST")" >> "$GITHUB_OUTPUT"

      - name: Resolve version from tag (override)
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" | sed 's/.*-v/version=/' >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ steps.cfg.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: tools/${{ matrix.slug }}/
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.cfg.outputs.image }}:${{ steps.version.outputs.version }}
            ${{ steps.cfg.outputs.image }}:latest

      - name: Sign image with cosign (keyless OIDC)
        run: cosign sign --yes "${{ steps.cfg.outputs.image }}@${{ steps.build.outputs.digest }}"

      - name: MCP smoke test
        run: |
          set -euo pipefail
          DIGEST="${{ steps.build.outputs.digest }}"
          IMAGE="${{ steps.cfg.outputs.image }}@${DIGEST}"
          docker pull "$IMAGE"
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"smoke","version":"0.0.1"}}}' \
            | timeout 15 docker run --rm -i --network=none "$IMAGE" /tmp \
            | head -1 \
            | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('result',{}).get('serverInfo'), f'bad init: {d}'"

      - name: Export image tarball (cold archive)
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          mkdir -p /tmp/archive
          docker save "${{ steps.cfg.outputs.image }}@${DIGEST}" \
            | gzip > "/tmp/archive/${{ matrix.slug }}-${{ steps.version.outputs.version }}.tar.gz"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.slug }}-${{ steps.version.outputs.version }}-archive
          path: /tmp/archive/*.tar.gz
          retention-days: 90

      - name: Job summary
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Published ${{ matrix.slug }}

          - **Version:** ${{ steps.version.outputs.version }}
          - **Image:** \`${{ steps.cfg.outputs.image }}@${DIGEST}\`
          - **Platforms:** linux/amd64, linux/arm64
          - **Signed:** cosign keyless (GitHub Actions OIDC)

          Update \`catalog/entries/pengine-${{ matrix.slug }}.json\` with digest:
          \`\`\`
          ${DIGEST}
          \`\`\`
          EOF
