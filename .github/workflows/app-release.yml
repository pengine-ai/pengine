name: App Release

# Build pengine for macOS (universal), Windows, and Linux and attach the
# installers as assets to a GitHub Release.
#
# Triggers:
#   - Push a tag matching v* (e.g. v1.0.1) → builds and creates a draft release
#   - Manual dispatch → same, but you pass the tag as an input
#
# macOS builds are signed with an Apple Developer ID certificate and notarized
# via Apple's notary service so that users see no Gatekeeper warnings on first
# launch. Windows and Linux builds remain unsigned for now.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   APPLE_CERTIFICATE          – base64-encoded .p12 export of the
#                                "Developer ID Application: …" certificate
#   APPLE_CERTIFICATE_PASSWORD – passphrase for the .p12
#   APPLE_SIGNING_IDENTITY     – exact string shown in Keychain, e.g.
#                                "Developer ID Application: Acme Inc (TEAM1234AB)"
#   APPLE_ID                   – Apple ID email used for notarization
#   APPLE_PASSWORD             – App-specific password for that Apple ID
#   APPLE_TEAM_ID              – 10-character Apple Developer Team ID
#
# See doc/guides/releasing.md for how to export the certificate and generate
# an app-specific password.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.1)"
        required: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            slug: macos
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-22.04
            slug: linux
            args: ""
            rust-targets: ""
          - platform: windows-latest
            slug: windows
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # ── macOS: import the Developer ID certificate into a temporary keychain
      # so that codesign(1) and the Tauri bundler can find it automatically.
      - name: Import Apple Developer ID certificate (macOS only)
        if: matrix.platform == 'macos-latest'
        env:
          CERTIFICATE_B64: ${{ secrets.APPLE_CERTIFICATE }}
          CERTIFICATE_PWD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Write the base64-encoded .p12 to disk
          echo "$CERTIFICATE_B64" | base64 --decode > certificate.p12

          # Create a short-lived keychain that only this job can see
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate and make it available to codesign
          security import certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PWD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to the search list so tools find it without an explicit path
          # shellcheck disable=SC2046  # intentional word-splitting on newlines
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')

          # Tidy up the .p12 from disk immediately
          rm certificate.p12

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            file \
            wget

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri reads these to sign and notarize the .app / .dmg on macOS.
          # On non-macOS runners the variables are simply unused.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "pengine __VERSION__"
          releaseBody: |
            Download the installer for your platform from the assets below.

            - macOS (universal): `.dmg` — signed & notarized, no Gatekeeper warning
            - Windows: `.msi` / `.exe`
            - Linux: `.deb` / `.AppImage`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # ── macOS: remove the temporary keychain so the certificate cannot be
      # reused by subsequent jobs on the same runner.
      - name: Remove temporary keychain (macOS only)
        if: matrix.platform == 'macos-latest' && always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true

      - name: Stage binaries
        id: stage
        shell: bash
        env:
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
        run: bash .github/scripts/app-release/stage-binaries.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pengine-${{ matrix.slug }}
          path: ${{ steps.stage.outputs.dir }}
          if-no-files-found: error

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.stage.outputs.dir }}/*
