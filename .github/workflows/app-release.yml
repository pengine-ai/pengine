name: App Release

# Build pengine for macOS (universal), Windows, and Linux and attach the
# installers as assets to a GitHub Release.
#
# Triggers:
#   - Push a tag matching v* (e.g. v1.0.1) → builds and creates a draft release
#   - Manual dispatch → same, but you pass the tag as an input
#
# Builds are currently unsigned. See doc/guides/releasing.md for how to obtain
# Apple and Windows code-signing credentials and wire them back in here.
#
# After the installers are built, each platform job also pushes them to GHCR
# as an OCI artifact (ghcr.io/<owner>/pengine-installer-<slug>:<version>) so
# they appear on the org's linked artifacts page alongside tool images.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.1)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            slug: macos
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-22.04
            slug: linux
            args: ""
            rust-targets: ""
          - platform: windows-latest
            slug: windows
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            file \
            wget

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "pengine __VERSION__"
          releaseBody: |
            Download the installer for your platform from the assets below.

            - macOS (universal): `.dmg`
            - Windows: `.msi` / `.exe`
            - Linux: `.deb` / `.AppImage`

            > These builds are **not code-signed**. First-launch warnings on macOS and Windows are expected — see the installation notes in the README.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Set up oras
        uses: oras-project/setup-oras@v1

      - name: Publish installers to GHCR
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          SLUG: ${{ matrix.slug }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.repository }}
          REVISION: ${{ github.sha }}
        run: bash .github/scripts/app-release/push-installers.sh
