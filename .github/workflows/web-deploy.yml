name: Deploy web app

# Required `tag` (GHCR semver tag, e.g. 1.0.2). If image missing → checkout + build + push.
# Deploy never uses actions/checkout: compose is fetched via GitHub API, then SSH + scp + pull.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Registry / deploy tag (e.g. 1.0.2). Git ref must exist (tag or branch) for compose + optional build."
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: pengine-web-deploy-${{ github.event.inputs.tag }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/pengine-web

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Resolve git ref and registry tag
        id: meta
        run: |
          set -euo pipefail
          REF="${{ github.event.inputs.tag }}"
          REF="${REF#refs/tags/}"
          TAG="${REF#v}"
          echo "ref=${REF}" >>"$GITHUB_OUTPUT"
          echo "tag=${TAG}" >>"$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image already exists in GHCR
        id: registry
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          if docker buildx imagetools inspect "${{ env.IMAGE }}:${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >>"$GITHUB_OUTPUT"
            echo "Image ${{ env.IMAGE }}:${TAG} already in GHCR — skipping build."
          else
            echo "exists=false" >>"$GITHUB_OUTPUT"
            echo "Image ${{ env.IMAGE }}:${TAG} not in GHCR — will build and push."
          fi

      - uses: actions/checkout@v4
        if: steps.registry.outputs.exists != 'true'
        with:
          ref: ${{ steps.meta.outputs.ref }}
          fetch-depth: 1

      - name: Verify deploy assets
        if: steps.registry.outputs.exists != 'true'
        run: |
          set -euo pipefail
          test -f deploy/Dockerfile
          test -f deploy/docker-compose.yml

      - name: Git short SHA
        if: steps.registry.outputs.exists != 'true'
        id: git
        run: echo "short=$(git rev-parse --short HEAD)" >>"$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
        if: steps.registry.outputs.exists != 'true'

      - name: Build and push
        if: steps.registry.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          build-args: |
            VITE_APP_ORIGIN=https://pengine.net
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:sha-${{ steps.git.outputs.short }}
            ${{ env.IMAGE }}:latest

      - name: Fetch deploy/docker-compose.yml (Contents API — no git checkout for deploy)
        env:
          REF: ${{ steps.meta.outputs.ref }}
        run: |
          set -euo pipefail
          API_URL="https://api.github.com/repos/${{ github.repository }}/contents/deploy/docker-compose.yml?ref=${REF}"
          if ! curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -o /tmp/compose-api.json \
            "$API_URL"; then
            echo "::error::Could not fetch deploy/docker-compose.yml for ref '${REF}' (missing tag/branch on GitHub, or no access)."
            exit 1
          fi
          jq -r .content /tmp/compose-api.json | base64 -d > docker-compose.upload.yml
          test -s docker-compose.upload.yml

      - name: Ensure remote directory
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          timeout: 2m
          script: mkdir -p ~/pengine

      - name: Copy docker-compose.yml to host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          timeout: 2m
          source: "docker-compose.upload.yml"
          target: "~/pengine/"
          overwrite: true

      - name: SSH — compose pull on host
        uses: appleboy/ssh-action@v1.2.5
        env:
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PENGINE_WEB_IMAGE: "${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}"
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          timeout: 3m
          command_timeout: 10m
          envs: GHCR_USER,GHCR_TOKEN,PENGINE_WEB_IMAGE
          script: |
            set -euo pipefail
            mv -f ~/pengine/docker-compose.upload.yml ~/pengine/docker-compose.yml
            cd ~/pengine
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            export PENGINE_WEB_IMAGE
            docker compose pull
            docker compose up -d --remove-orphans
