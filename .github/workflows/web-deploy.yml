name: Deploy web app

# Build → GHCR (:<version>, :sha-*, :latest). Version tag = exact git tag (e.g. 1.0.1) if
# present, else package.json. Deploy uses digest pin (immutable) of that build.
# workflow_dispatch; optional `ref`. Secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or SHA). Empty = tip of the branch you select in the UI."
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: pengine-web-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/pengine-web
  CHECKOUT_REF: ${{ github.event.inputs.ref != '' && github.event.inputs.ref || github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.ref.outputs.image_ref }}
      image_version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Verify deploy assets
        run: |
          set -euo pipefail
          test -f deploy/Dockerfile
          test -f deploy/docker-compose.yml

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: ver
        run: |
          set -euo pipefail
          VERSION="$(jq -r .version package.json)"
          if TAG="$(git describe --tags --exact-match 2>/dev/null)"; then
            VERSION="${TAG#v}"
          fi
          echo "version=${VERSION}" >>"$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >>"$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          build-args: |
            VITE_APP_ORIGIN=https://pengine.net
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:sha-${{ steps.ver.outputs.short_sha }}
            ${{ env.IMAGE }}:latest

      - name: Export image ref (digest pin for deploy)
        id: ref
        run: echo "image_ref=${{ env.IMAGE }}@${{ steps.build.outputs.digest }}" >>"$GITHUB_OUTPUT"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Ensure remote directory
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          timeout: 2m
          script: mkdir -p ~/pengine

      - name: Copy docker-compose.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          timeout: 2m
          source: "deploy/docker-compose.yml"
          target: "~/pengine/"
          overwrite: true

      - name: Pull image (digest) and restart stack
        uses: appleboy/ssh-action@v1.2.5
        env:
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PENGINE_WEB_IMAGE: ${{ needs.build.outputs.image_ref }}
          IMAGE_VERSION: ${{ needs.build.outputs.image_version }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          timeout: 3m
          command_timeout: 10m
          envs: GHCR_USER,GHCR_TOKEN,PENGINE_WEB_IMAGE,IMAGE_VERSION
          script: |
            set -euo pipefail
            cd ~/pengine
            echo "Rolling out pengine-web:${IMAGE_VERSION} (digest-pinned)"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            export PENGINE_WEB_IMAGE
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

      - name: Verify container responds
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          timeout: 1m
          command_timeout: 2m
          script: |
            curl -sf --max-time 15 http://127.0.0.1:1420/ >/dev/null \
              && echo "OK: pengine web responds on 127.0.0.1:1420"
