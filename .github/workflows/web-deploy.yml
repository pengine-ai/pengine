name: Deploy web app

# workflow_dispatch with required `tag` (git tag = GHCR tag, e.g. 1.0.1).
# If ghcr.io/<owner>/pengine-web:<tag> already exists → skip build, only deploy.
# Otherwise → build, push to GHCR, then deploy. Host: docker login + compose pull + up.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to checkout and GHCR image tag (e.g. 1.0.1 or v1.0.1). Must exist on the remote."
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: pengine-web-deploy-${{ github.event.inputs.tag }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/pengine-web

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Resolve git ref and registry tag
        id: meta
        run: |
          set -euo pipefail
          REF="${{ github.event.inputs.tag }}"
          REF="${REF#refs/tags/}"
          TAG="${REF#v}"
          echo "ref=${REF}" >>"$GITHUB_OUTPUT"
          echo "tag=${TAG}" >>"$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.ref }}

      - name: Verify deploy assets
        run: |
          set -euo pipefail
          test -f deploy/Dockerfile
          test -f deploy/docker-compose.yml

      - name: Git short SHA
        id: git
        run: echo "short=$(git rev-parse --short HEAD)" >>"$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image already exists in GHCR
        id: registry
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          if docker buildx imagetools inspect "${{ env.IMAGE }}:${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >>"$GITHUB_OUTPUT"
            echo "Image ${{ env.IMAGE }}:${TAG} is already in GHCR — skipping build; deploying to host only."
          else
            echo "exists=false" >>"$GITHUB_OUTPUT"
            echo "Image ${{ env.IMAGE }}:${TAG} not in GHCR — building and pushing, then deploying."
          fi

      - uses: docker/setup-buildx-action@v3
        if: steps.registry.outputs.exists != 'true'

      - name: Build and push
        if: steps.registry.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          build-args: |
            VITE_APP_ORIGIN=https://pengine.net
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:sha-${{ steps.git.outputs.short }}
            ${{ env.IMAGE }}:latest

      - name: Ensure remote directory
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          timeout: 2m
          script: mkdir -p ~/pengine

      - name: Copy docker-compose.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          timeout: 2m
          source: "deploy/docker-compose.yml"
          target: "~/pengine/"
          overwrite: true

      - name: Pull image on host and restart stack
        uses: appleboy/ssh-action@v1.2.5
        env:
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PENGINE_WEB_IMAGE: "${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}"
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          timeout: 3m
          command_timeout: 10m
          envs: GHCR_USER,GHCR_TOKEN,PENGINE_WEB_IMAGE,IMAGE_TAG
          script: |
            set -euo pipefail
            cd ~/pengine
            echo "Deploying ${{ env.IMAGE }}:${IMAGE_TAG} (docker compose pull)"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            export PENGINE_WEB_IMAGE
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

      - name: Verify container responds
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          timeout: 1m
          command_timeout: 2m
          script: |
            curl -sf --max-time 15 http://127.0.0.1:1420/ >/dev/null \
              && echo "OK: pengine web responds on 127.0.0.1:1420"
