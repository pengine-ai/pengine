name: Build web app
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag / registry tag (e.g. 1.0.2). Image is built and pushed
          every run."
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: pengine-web-deploy-${{ github.event.inputs.tag }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/pengine-web

jobs:
  build-package:
    name: Build and push image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      ref: ${{ steps.meta.outputs.ref }}
      tag: ${{ steps.meta.outputs.tag }}
      image: ${{ env.IMAGE }}
    steps:
      - name: Resolve git ref and registry tag
        id: meta
        run: |
          set -euo pipefail
          REF="${{ github.event.inputs.tag }}"
          REF="${REF#refs/tags/}"
          TAG="${REF#v}"
          echo "ref=${REF}" >>"$GITHUB_OUTPUT"
          echo "tag=${TAG}" >>"$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Git short SHA
        id: git
        run: echo "short=$(git rev-parse --short HEAD)" >>"$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build and push package to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deployment/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          build-args: |
            VITE_APP_ORIGIN=https://pengine.net
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:sha-${{ steps.git.outputs.short }}
            ${{ env.IMAGE }}:latest
