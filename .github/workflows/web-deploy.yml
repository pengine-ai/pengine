name: Deploy web app

# Build the pengine web bundle in CI (Vite → static assets), package it with
# deploy/Dockerfile, push to GHCR, and roll out on the deploy host via
# docker compose under ~/pengine.
#
# Triggers:
#   - Push — any branch; builds and deploys the pushed commit.
#   - workflow_dispatch — use “Run workflow” and pick a branch, or set ref
#     (branch / tag / SHA). If ref is empty, uses the tip of the selected branch.
#
# Required secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY
# Optional: DEPLOY_HOST_KNOWN_HOSTS

on:
  push:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or SHA). Leave empty to use the selected branch tip."
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: pengine-web-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/pengine-web
  # Same commit for build + deploy (and matching docker-compose copy).
  CHECKOUT_REF: >-
    ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref != '' && github.event.inputs.ref || github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.ref.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Verify deploy assets
        run: |
          set -euo pipefail
          test -f deploy/Dockerfile
          test -f deploy/docker-compose.yml

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: ver
        run: |
          set -euo pipefail
          VERSION="$(jq -r .version package.json)"
          # HEAD matches CHECKOUT_REF (GITHUB_SHA is only the trigger SHA).
          SHORT_SHA="$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >>"$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >>"$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          build-args: |
            VITE_APP_ORIGIN=https://pengine.net
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:sha-${{ steps.ver.outputs.short_sha }}
            ${{ env.IMAGE }}:latest

      - name: Export image ref
        id: ref
        run: echo "image_ref=${{ env.IMAGE }}@${{ steps.build.outputs.digest }}" >>"$GITHUB_OUTPUT"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust host key
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_HOST_KNOWN_HOSTS: ${{ secrets.DEPLOY_HOST_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -n "${DEPLOY_HOST_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$DEPLOY_HOST_KNOWN_HOSTS" >>~/.ssh/known_hosts
          else
            ssh-keyscan -H "$DEPLOY_HOST" >>~/.ssh/known_hosts 2>/dev/null \
              || { echo "ssh-keyscan failed; set optional DEPLOY_HOST_KNOWN_HOSTS to pin the host key." >&2; exit 1; }
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Copy docker-compose.yml to host
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" 'mkdir -p ~/pengine'
          scp deploy/docker-compose.yml "$DEPLOY_USER@$DEPLOY_HOST:~/pengine/docker-compose.yml"

      - name: Pull and restart
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_REF: ${{ needs.build.outputs.image_ref }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            GHCR_USER="$GHCR_USER" \
            GHCR_TOKEN="$GHCR_TOKEN" \
            PENGINE_WEB_IMAGE="$IMAGE_REF" \
            'bash -s' <<'REMOTE'
          set -euo pipefail
          cd ~/pengine
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          export PENGINE_WEB_IMAGE
          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f
          REMOTE
