name: Publish tool catalog

on:
  push:
    branches: [main]
    paths:
      - "catalog/entries/**"

permissions:
  contents: write
  id-token: write  # cosign keyless OIDC

jobs:
  regenerate-and-sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@v3

      - name: Regenerate catalog/v1/tools.json from entries
        run: |
          python3 - <<'PYEOF'
          import json, glob, os, sys
          from datetime import datetime, timezone, timedelta

          entries_dir = "catalog/entries"
          out_path = "catalog/v1/tools.json"

          # Read existing catalog to get current revision (if any)
          current_revision = 0
          if os.path.exists(out_path):
              with open(out_path) as f:
                  existing = json.load(f)
                  current_revision = existing.get("catalog_revision", 0)

          tools = []
          seen_keys = {}  # server_key -> tool id, detect collisions
          for path in sorted(glob.glob(os.path.join(entries_dir, "*.json"))):
              with open(path) as f:
                  entry = json.load(f)
              # Ensure required fields
              if "id" not in entry or "current" not in entry or "versions" not in entry:
                  print(f"SKIP {path}: missing required fields", file=sys.stderr)
                  continue
              # Guard: reject tool IDs that collide after replace('/', '-')
              tool_id = entry["id"]
              key = "te_" + tool_id.replace("/", "-")
              if key in seen_keys:
                  print(f"ERROR {path}: tool id '{tool_id}' collides with '{seen_keys[key]}' (both map to server key '{key}')", file=sys.stderr)
                  sys.exit(1)
              seen_keys[key] = tool_id
              tools.append(entry)

          now = datetime.now(timezone.utc)
          catalog = {
              "schema_version": 1,
              "generated_at": now.strftime("%Y-%m-%dT%H:%M:%SZ"),
              "catalog_revision": current_revision + 1,
              "valid_until": (now + timedelta(days=30)).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "minimum_pengine_version": "0.5.0",
              "tools": tools,
          }

          with open(out_path, "w") as f:
              json.dump(catalog, f, indent=2)
              f.write("\n")

          print(f"Generated {out_path} with {len(tools)} tool(s), revision {catalog['catalog_revision']}")
          PYEOF

      - name: Sign catalog with cosign (keyless OIDC)
        run: |
          cosign sign-blob --yes \
            --output-signature catalog/v1/tools.json.sig \
            catalog/v1/tools.json

      - name: Commit updated catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog/v1/tools.json catalog/v1/tools.json.sig
          if git diff --cached --quiet; then
            echo "No catalog changes to commit"
          else
            git commit -m "chore(catalog): regenerate tools.json (revision $(python3 -c "import json; print(json.load(open('catalog/v1/tools.json'))['catalog_revision'])"))"
            git push
          fi
